<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arbitr OSINT | Вход</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { display: flex; justify-content: center; align-items: center; overflow: hidden; }
        .login-container { position: relative; z-index: 50; background: rgba(18,18,18,0.92); border: 1px solid rgba(255,255,255,0.05); border-radius: 6px; padding: 50px 45px; backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px); width: 420px; max-width: 92vw; animation: interfaceFadeIn 0.8s ease-out forwards; }
        .login-container h2 { color: #ddd; font-size: 26px; letter-spacing: 6px; text-align: center; margin-bottom: 6px; font-weight: 300; text-transform: uppercase; }
        .login-subhead { color: #444; font-size: 10px; letter-spacing: 4px; text-align: center; margin-bottom: 35px; text-transform: uppercase; }
        .input-wrap { position: relative; margin-bottom: 12px; }
        .input-wrap label { display: block; font-size: 9px; color: #444; letter-spacing: 3px; margin-bottom: 6px; text-transform: uppercase; }
        .input-wrap input { width: 100%; padding: 14px 16px; background: rgba(0,0,0,0.55); border: 1px solid rgba(255,255,255,0.06); border-radius: 4px; color: #bbb; font-family: 'Courier New', monospace; font-size: 13px; outline: none; transition: all 0.3s; letter-spacing: 1px; }
        .input-wrap input:focus { border-color: #444; background: rgba(0,0,0,0.7); color: #fff; }
        .input-wrap input::placeholder { color: #333; }
        .input-wrap .char-count { position: absolute; right: 12px; bottom: 14px; font-size: 9px; color: #333; letter-spacing: 1px; transition: all 0.3s; }
        .input-wrap .char-count.ready { color: #666; }
        .login-btn { width: 100%; padding: 15px; background: #1a1a1a; color: #555; border: 1px solid rgba(255,255,255,0.05); border-radius: 4px; font-size: 13px; font-weight: 500; cursor: pointer; letter-spacing: 4px; text-transform: uppercase; transition: all 0.4s ease; font-family: 'Courier New', monospace; margin-top: 8px; }
        .login-btn.ready { background: #222; color: #ccc; border-color: rgba(255,255,255,0.12); box-shadow: 0 0 25px rgba(255,255,255,0.04); cursor: pointer; }
        .login-btn.ready:hover { background: #2a2a2a; color: #fff; border-color: #e53935; box-shadow: 0 0 35px rgba(229,57,53,0.2); transform: translateY(-2px); }
        .login-btn:not(.ready) { cursor: not-allowed; opacity: 0.5; }
        .google-btn { width: 100%; padding: 13px; background: transparent; color: #555; border: 1px solid rgba(255,255,255,0.05); border-radius: 4px; font-size: 12px; cursor: pointer; letter-spacing: 2px; transition: all 0.3s; font-family: 'Courier New', monospace; margin-top: 8px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .google-btn:hover { border-color: #444; color: #ccc; background: rgba(255,255,255,0.02); }
        .divider { display: flex; align-items: center; gap: 15px; margin: 18px 0; color: #2a2a2a; font-size: 9px; letter-spacing: 3px; text-transform: uppercase; }
        .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.04); }
        .login-subtitle { text-align: center; font-size: 11px; color: #444; margin-top: 20px; letter-spacing: 1px; }
        .login-subtitle a { color: #666; text-decoration: none; transition: all 0.3s; }
        .login-subtitle a:hover { color: #e53935; }
        .login-error { color: #e53935; font-size: 10px; text-align: center; margin-top: 10px; min-height: 14px; letter-spacing: 1px; }
        .author-line { text-align: center; margin-top: 30px; font-size: 10px; color: #2a2a2a; letter-spacing: 2px; line-height: 1.8; }
        .author-line a { color: #333; text-decoration: none; transition: all 0.3s; }
        .author-line a:hover { color: #e53935; }
    </style>
</head>
<body>
    <canvas id="matrix-bg"></canvas>
    <div class="scanlines"></div>
    <div class="vignette"></div>
    <div class="login-container">
        <h2>OSINT PORTAL</h2>
        <p class="login-subhead">// authentication_required</p>
        <div class="input-wrap"><label>Email</label><input type="email" id="email" placeholder="user@example.com" autocomplete="off"></div>
        <div class="input-wrap"><label>Пароль</label><input type="password" id="password" placeholder="Минимум 6 символов" autocomplete="off"><span class="char-count" id="char-count">0/6</span></div>
        <button class="login-btn" id="login-btn" disabled>Войти</button>
        <div class="divider">или</div>
        <button class="google-btn" id="google-btn"><span style="font-size:16px;font-weight:bold;">G</span> Войти через Google</button>
        <p class="login-error" id="login-error"></p>
        <p class="login-subtitle" id="login-subtitle">Нет аккаунта? <a href="#" id="switch-to-register">Создать</a></p>
        <p class="author-line">Автор: @arbitrxd<br><a href="https://t.me/+yAisTVbDXLI1NWM6" target="_blank">Закрытый приват</a></p>
    </div>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="script.js"></script>
</body>
</html>
